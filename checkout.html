<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Eden Delights</title>
    <style>
        body { background-color: #f5efe6; font-family: Georgia, serif; display: flex; justify-content: center; padding: 20px; }
        .checkout-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #4b2c20; }
        .info { color: #d4af37; font-size: 1.2em; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #d4af37; border-radius: 8px; box-sizing: border-box; }
        .qty-box { display: flex; align-items: center; gap: 15px; margin: 15px 0; }
        button { background-color: #d4af37; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>

<div class="checkout-box">
    <h2 id="item-name">Loading...</h2>
    <p class="info" id="price-display"></p>
    
    <div class="qty-box">
        <button onclick="changeQty(-1)" style="width: 50px;">-</button>
        <span id="qty" style="font-size: 20px;">1</span>
        <button onclick="changeQty(1)" style="width: 50px;">+</button>
    </div>

    <input type="text" placeholder="Full Name" required>
    <input type="text" placeholder="Address" required>
    <input type="text" placeholder="Pincode" required>
    <select style="width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px;">
        <option>Select Payment Mode</option>
        <option>Google Pay / UPI</option>
        <option>Cash on Delivery</option>
    </select>
    
    <button onclick="alert('Order Placed Successfully!')">Confirm Payment</button>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('item-name').innerText = params.get('item');
    document.getElementById('price-display').innerText = "Price: ₹" + params.get('price');

    let q = 1;
    function changeQty(val) {
        if(q + val > 0) { q += val; document.getElementById('qty').innerText = q; }
    }
</script>
</body>
</html>
